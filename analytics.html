<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - SchoolERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e27;
            --bg-darker: #050810;
            --bg-card: rgba(20, 28, 52, 0.6);
            --border-color: rgba(168, 85, 247, 0.2);
            --accent-gold: #d4af37;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --text-primary: #f0f4f8;
            --text-secondary: #b0bcc4;
            --glow-purple: rgba(168, 85, 247, 0.3);
            --glow-gold: rgba(212, 175, 55, 0.2);
        }

        body {
            background: linear-gradient(135deg, var(--bg-darker) 0%, #1a1f3a 100%);
            display: flex;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* ================= SIDEBAR ================= */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, rgba(10, 14, 39, 0.95) 0%, rgba(20, 28, 52, 0.95) 100%);
            position: fixed;
            padding: 40px 25px;
            border-right: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            z-index: 1000;
            overflow-y: auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 60px;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo span {
            color: var(--accent-purple);
            -webkit-text-fill-color: var(--accent-purple);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-secondary);
            padding: 16px 18px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .menu a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--glow-purple) 0%, transparent 100%);
            border-radius: 12px;
            transition: width 0.3s ease-out;
            z-index: -1;
        }

        .menu a:hover {
            color: var(--text-primary);
            border-color: var(--accent-purple);
            transform: translateX(8px);
        }

        .menu a:hover::before {
            width: 100%;
        }

        .menu a i {
            font-size: 18px;
            color: var(--accent-purple);
        }

        /* ================= MAIN ================= */
        .main {
            margin-left: 260px;
            width: calc(100% - 260px);
            padding: 50px 45px;
            animation: fadeInUp 0.8s ease-out;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
            position: relative;
        }

        .topbar h1 {
            font-size: 42px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ================= CARDS ================= */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--bg-card);
            padding: 35px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.6s ease-out both;
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, var(--glow-purple) 50%, transparent 100%);
            transition: left 0.5s ease;
            z-index: 0;
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--accent-purple);
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.15),
                        inset 0 0 20px rgba(168, 85, 247, 0.05);
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .card i {
            font-size: 48px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            display: inline-block;
        }

        .card h2 {
            font-size: 44px;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 12px;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        .card p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ================= CHARTS ================= */
        .chart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .chart-box {
            background: var(--bg-card);
            padding: 35px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            animation: slideInUp 0.6s ease-out 0.5s both;
        }

        .chart-box:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.1);
        }

        .chart-box h2 {
            margin-bottom: 25px;
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
        }

        .chart-box canvas {
            max-height: 350px;
        }

        /* ================= TABLE ================= */
        .table-box {
            background: var(--bg-card);
            padding: 35px;
            border-radius: 18px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            animation: slideInUp 0.6s ease-out 0.6s both;
            overflow-x: auto;
        }

        .table-box:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.1);
        }

        .table-box h2 {
            margin-bottom: 25px;
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.5px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 14px;
        }

        thead {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%);
        }

        th {
            padding: 18px 20px;
            text-align: left;
            color: var(--accent-gold);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 16px 20px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(168, 85, 247, 0.1);
        }

        tr:hover {
            background: linear-gradient(90deg, rgba(168, 85, 247, 0.08) 0%, transparent 100%);
        }

        tr:hover td {
            color: var(--text-primary);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* ================= ANIMATIONS ================= */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ================= SCROLLBAR ================= */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(168, 85, 247, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--accent-gold) 0%, var(--accent-purple) 100%);
        }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 1200px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .logo {
                margin-bottom: 0;
            }

            .menu {
                display: none;
            }

            .main {
                margin-left: 0;
                width: 100%;
                padding: 30px 20px;
            }

            .topbar h1 {
                font-size: 28px;
            }

            .cards {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
            }

            .card {
                padding: 25px;
            }

            .card i {
                font-size: 36px;
            }

            .card h2 {
                font-size: 32px;
            }
        }

    </style>
</head>
<body>

    <!-- ================= SIDEBAR ================= -->
    <div class="sidebar">
        <div class="logo">
            School<span>ERP</span>
        </div>

        <div class="menu">
            <a href="adminHome.html">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>
            <a href="analytics.html">
                <i class="fa-solid fa-chart-line"></i>
                Analytics
            </a>
            <a href="LogoutServlet">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>
        </div>
    </div>

    <!-- ================= MAIN ================= -->
    <div class="main">
        <div class="topbar">
            <h1>Analytics Dashboard</h1>
        </div>

        <!-- ================= CARDS ================= -->
        <div class="cards">
            <div class="card">
                <div class="card-content">
                    <i class="fa-solid fa-user-graduate"></i>
                    <h2 id="students">0</h2>
                    <p>Total Students</p>
                </div>
            </div>

            <div class="card">
                <div class="card-content">
                    <i class="fa-solid fa-code-branch"></i>
                    <h2 id="branches">0</h2>
                    <p>Total Branches</p>
                </div>
            </div>

            <div class="card">
                <div class="card-content">
                    <i class="fa-solid fa-trophy"></i>
                    <h2 id="topBranch">None</h2>
                    <p>Top Branch</p>
                </div>
            </div>

            <div class="card">
                <div class="card-content">
                    <i class="fa-solid fa-star"></i>
                    <h2 id="avgCgpa">0</h2>
                    <p>Average CGPA</p>
                </div>
            </div>
        </div>

        <!-- ================= CHARTS ================= -->
        <div class="chart-grid">
            <div class="chart-box">
                <h2>📊 Students & Branch Analytics</h2>
                <canvas id="barChart"></canvas>
            </div>

            <div class="chart-box">
                <h2>🎯 Branch Distribution</h2>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <!-- ================= TABLE ================= -->
        <div class="table-box">
            <h2>✨ Latest Students</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Branch</th>
                        <th>CGPA</th>
                    </tr>
                </thead>
                <tbody id="studentTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ================= FETCH ANALYTICS =================
        fetch("AnalyticsServlet")
            .then(response => response.json())
            .then(data => {
                // ================= UPDATE CARDS =================
                document.getElementById("students").innerText = data.totalStudents;
                document.getElementById("branches").innerText = data.totalBranches;
                document.getElementById("topBranch").innerText = data.topBranch;
                document.getElementById("avgCgpa").innerText = data.avgCgpa.toFixed(2);

                // ================= BAR CHART =================
                const barCtx = document.getElementById("barChart").getContext("2d");
                new Chart(barCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Students', 'Branches'],
                        datasets: [{
                            label: 'Analytics',
                            data: [
                                data.totalStudents,
                                data.totalBranches
                            ],
                            backgroundColor: [
                                'rgba(168, 85, 247, 0.8)',
                                'rgba(6, 182, 212, 0.8)'
                            ],
                            borderColor: [
                                '#a855f7',
                                '#06b6d4'
                            ],
                            borderWidth: 2,
                            borderRadius: 8,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#f0f4f8',
                                    font: {
                                        size: 13,
                                        weight: '600'
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    color: '#b0bcc4'
                                },
                                grid: {
                                    color: 'rgba(168, 85, 247, 0.1)'
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#b0bcc4'
                                },
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });

                // ================= PIE CHART =================
                const pieCtx = document.getElementById("pieChart").getContext("2d");
                new Chart(pieCtx, {
                    type: 'doughnut',
                    data: {
                        labels: data.branchNames,
                        datasets: [{
                            data: data.branchCounts,
                            backgroundColor: [
                                'rgba(168, 85, 247, 0.8)',
                                'rgba(6, 182, 212, 0.8)',
                                'rgba(212, 175, 55, 0.8)',
                                'rgba(244, 63, 94, 0.8)',
                                'rgba(34, 197, 94, 0.8)'
                            ],
                            borderColor: [
                                '#a855f7',
                                '#06b6d4',
                                '#d4af37',
                                '#f43f5e',
                                '#22c55e'
                            ],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#f0f4f8',
                                    font: {
                                        size: 12,
                                        weight: '600'
                                    },
                                    padding: 15
                                }
                            }
                        }
                    }
                });

                // ================= TABLE =================
                let table = document.getElementById("studentTable");
                data.students.forEach(student => {
                    table.innerHTML += `
                    <tr>
                        <td>${student.id}</td>
                        <td><strong>${student.name}</strong></td>
                        <td>${student.branch}</td>
                        <td><strong>${student.cgpa}</strong></td>
                    </tr>
                    `;
                });
            })
            .catch(error => {
                console.error("Error fetching analytics:", error);
            });
    </script>

</body>
</html>
